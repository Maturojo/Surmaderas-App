<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 660">

  <!-- Row 0: cols 1-2 -->
  <rect x="130" y="30"  width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>
  <rect x="230" y="30"  width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>

  <!-- Row 1: cols 1-3 -->
  <rect x="130" y="130" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>
  <rect x="230" y="130" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>
  <rect x="330" y="130" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>

  <!-- Row 2 (S row): cols 0-3 -->
  <rect x="30"  y="230" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>
  <rect x="130" y="230" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>
  <rect x="230" y="230" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>
  <rect x="330" y="230" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>

  <!-- Row 3: cols 1-3 -->
  <rect x="130" y="330" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>
  <rect x="230" y="330" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>
  <rect x="330" y="330" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>

  <!-- Row 4: cols 1-2 -->
  <rect x="130" y="430" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>
  <rect x="230" y="430" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>

  <!-- Row 5: cols 1-2 -->
  <rect x="130" y="530" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>
  <rect x="230" y="530" width="100" height="100" fill="white" stroke="#606060" stroke-width="5"/>

  <!-- Círculo con S — col 1, row 2 -->
  <circle cx="180" cy="280" r="44" fill="white" stroke="#606060" stroke-width="5"/>
  <text
    x="180" y="280"
    font-family="'Arial Black', 'Franklin Gothic Heavy', sans-serif"
    font-size="60" font-weight="900"
    fill="#606060" text-anchor="middle" dominant-baseline="central">S</text>

  <!-- u — col 2, row 2 -->
  <text
    x="280" y="283"
    font-family="'Arial Black', 'Franklin Gothic Heavy', sans-serif"
    font-size="52" font-weight="900"
    fill="#606060" text-anchor="middle" dominant-baseline="central">u</text>

  <!-- r — col 3, row 2 -->
  <text
    x="380" y="283"
    font-family="'Arial Black', 'Franklin Gothic Heavy', sans-serif"
    font-size="52" font-weight="900"
    fill="#606060" text-anchor="middle" dominant-baseline="central">r</text>

</svg>
